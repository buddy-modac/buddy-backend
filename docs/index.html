<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="3; url=ai-eval/" />
  <title>Buddy Reports</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #fff;
      --text: #172033;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #1f6feb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(680px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .sub {
      margin-top: 14px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Buddy Reports</h1>
    <p>AI screenshot evaluation report 페이지로 이동합니다. 자동으로 이동하지 않으면 아래 버튼을 눌러주세요.</p>
    <a href="ai-eval/">AI Eval Report 열기</a>
    <p class="sub">GitHub Pages source가 <code>docs/</code>일 때 이 페이지는 <code>/</code>, 리포트는 <code>/ai-eval/</code>에서 열립니다.</p>
  </main>
</body>
</html>
