<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이미지 클립보드</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { margin: 0 0 16px; opacity: .7; font-size: 13px; }
  .bar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  button { padding: 8px 14px; border-radius: 8px; border: 1px solid #8884; cursor: pointer; }
  #status { font-size: 13px; opacity: .8; }
  #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .card { border: 1px solid #8883; border-radius: 10px; overflow: hidden; }
  .card img { width: 100%; height: 140px; object-fit: cover; display: block; background: #8881; }
  .card .meta { padding: 6px 8px; font-size: 12px; display: flex; justify-content: space-between; gap: 6px; }
  .card .meta a { text-decoration: none; }
  .card .del { color: #c00; cursor: pointer; border: none; background: none; font-size: 12px; padding: 0; }
</style>
</head>
<body>
  <h1>🖼️ 이미지 클립보드</h1>
  <p class="sub">누구나 올리고 받는 공개 갤러리. 표시는 <code>&lt;img src=url&gt;</code> 한 줄 — 프런트는 base64를 만지지 않습니다.</p>

  <div class="bar">
    <input type="text" id="nick" placeholder="닉네임(선택)" style="padding:8px 10px;border-radius:8px;border:1px solid #8884;">
    <input type="file" id="file" accept="image/*">
    <button id="upload">업로드</button>
    <button id="refresh">새로고침</button>
    <span id="status"></span>
  </div>

  <div id="gallery"></div>

<script>
const $ = (s) => document.querySelector(s);
const statusEl = $('#status');
const esc = (s) => (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function load() {
  // 목록 → 표시: base64 디코딩도, MIME 추측도 없음. API가 준 url 그대로.
  const { items } = await (await fetch('/clipboard')).json();
  $('#gallery').innerHTML = items.map(it => `
    <div class="card">
      <a href="${it.url}" target="_blank"><img src="${it.url}" alt="${it.name || ''}" loading="lazy"></a>
      <div class="meta">
        <span title="올린 사람">👤 ${esc(it.nickname || '익명')}</span>
        <button class="del" data-id="${it.id}">삭제</button>
      </div>
      <div class="meta"><a href="${it.url}?download=1">⬇︎ ${(it.size/1024).toFixed(0)}KB</a></div>
    </div>`).join('') || '<p style="opacity:.6">아직 이미지가 없습니다.</p>';
}

$('#upload').onclick = async () => {
  const f = $('#file').files[0];
  if (!f) { statusEl.textContent = '파일을 골라주세요'; return; }
  statusEl.textContent = '업로드 중…';
  // 멀티파트 업로드 — 클라이언트 base64 인코딩 0줄.
  const fd = new FormData();
  fd.append('file', f);
  const nk = $('#nick').value.trim();
  if (nk) fd.append('nickname', nk);
  const r = await fetch('/clipboard', { method: 'POST', body: fd });
  statusEl.textContent = r.ok ? '완료' : ('실패: ' + r.status);
  $('#file').value = '';
  if (r.ok) load();
};

$('#refresh').onclick = load;

$('#gallery').onclick = async (e) => {
  const btn = e.target.closest('.del');
  if (!btn) return;
  await fetch('/clipboard/' + btn.dataset.id, { method: 'DELETE' });
  load();
};

load();
</script>
</body>
</html>
