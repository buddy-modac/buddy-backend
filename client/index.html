<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buddy — MBTI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hub">
    <div class="hub-header">
      <div class="emoji">🤝</div>
      <h1>Buddy MBTI</h1>
      <p class="subtitle">나와 잘 맞는 버디를 찾아보세요</p>
    </div>

    <div class="hub-cards">

      <!-- 직접 테스트 -->
      <a href="quiz.html" class="hub-card hub-card--primary">
        <div class="hub-card__icon">📝</div>
        <div class="hub-card__content">
          <strong>직접 테스트</strong>
          <span>질문에 답하며 내 MBTI 확인</span>
        </div>
        <div class="hub-card__arrow">›</div>
      </a>

      <!-- 랜덤 뽑기 -->
      <button type="button" class="hub-card hub-card--secondary" id="btn-random">
        <div class="hub-card__icon">🎲</div>
        <div class="hub-card__content">
          <strong>랜덤 뽑기</strong>
          <span>버튼 클릭으로 즉시 결과 확인</span>
        </div>
        <div class="hub-card__arrow">›</div>
      </button>

      <a href="api-test.html" class="hub-card hub-card--secondary">
        <div class="hub-card__icon">🔌</div>
        <div class="hub-card__content">
          <strong>API 테스트</strong>
          <span>로컬 API 호출 확인</span>
        </div>
        <div class="hub-card__arrow">›</div>
      </a>

      <a href="image-report.html" class="hub-card hub-card--secondary">
        <div class="hub-card__icon">🖼️</div>
        <div class="hub-card__content">
          <strong>이미지 생성 리포트</strong>
          <span>모델 비교, 비용, 스트리밍 결과 확인</span>
        </div>
        <div class="hub-card__arrow">›</div>
      </a>

    </div>

    <!-- 랜덤 결과 표시 영역 -->
    <div id="random-result" class="random-result hidden">
      <div class="random-result__mbti" id="random-mbti" aria-live="polite"></div>
      <button type="button" class="btn-text" id="btn-random-again">다시 뽑기 🎲</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script>
    function showRandom() {
      const mbti = randomMbti();
      document.getElementById('random-mbti').textContent = mbti;
      document.getElementById('random-result').classList.remove('hidden');
    }

    document.getElementById('btn-random').addEventListener('click', showRandom);
    document.getElementById('btn-random-again').addEventListener('click', showRandom);
  </script>
</body>
</html>
